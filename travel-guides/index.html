<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Guides</title>
  <link rel="stylesheet" href="guides.css">
</head>
<body>

<div class="page">

  <header class="site-header">
    <a class="site-logo" href="index.html">
      <span class="icon">travel_explore</span>
      Travel Guides
    </a>
  </header>

  <div class="index-intro">
    <h1>Where to next?</h1>
    <p>Curated destinations for the round-the-world trip — updated as plans evolve.</p>
  </div>

  <div class="dest-grid" id="dest-grid"></div>

</div>

<script>
/**
 * Add destinations here.
 * Each entry maps to:  destinations/{id}.html  +  data/{id}.json  +  img/{id}.jpg
 */
const DESTINATIONS = [
  {
    id:      'patagonia',
    title:   'Patagonia',
    tagline: 'Wild glaciers, jagged peaks, and vast open silence.',
    icon:    'landscape',
    tags:    ['calendar_month Best time: Jan–Feb', 'schedule 10–14 days', 'payments $$$', 'nature Nature'],
  },
  {
    id:      'athens',
    title:   'Athens',
    tagline: 'Ancient marble and modern chaos in equal measure.',
    icon:    'account_balance',
    tags:    ['calendar_month Best time: Apr–Jun', 'schedule 5–7 days', 'payments $$', 'museum History'],
  },
  // ── Add more destinations here ──────────────────────────────
  // {
  //   id:      'singapore',
  //   title:   'Singapore',
  //   tagline: 'Gleaming skyline, hawker centres, and a perfect transit hub.',
  //   icon:    'location_city',
  //   tags:    ['calendar_month Year-round', 'schedule 3–5 days', 'payments $$$', 'city City'],
  // },
];

function icon(name) {
  const s = document.createElement('span');
  s.className = 'icon';
  s.textContent = name;
  return s;
}

const grid = document.getElementById('dest-grid');

DESTINATIONS.forEach(d => {
  const card = document.createElement('a');
  card.className = 'dest-card';
  card.href = `destinations/${d.id}.html`;

  // Image with icon fallback
  const imgWrap = document.createElement('div');
  imgWrap.className = 'dest-card-img';
  const img = document.createElement('img');
  img.src = `img/${d.id}.jpg`;
  img.alt = d.title;
  img.onerror = () => {
    imgWrap.innerHTML = '';
    const ic = icon(d.icon || 'travel_explore');
    ic.classList.add('icon-xl');
    imgWrap.append(ic);
  };
  imgWrap.append(img);

  // Body
  const body = document.createElement('div');
  body.className = 'dest-card-body';

  const h2 = document.createElement('h2');
  h2.textContent = d.title;

  const p = document.createElement('p');
  p.textContent = d.tagline;

  const tags = document.createElement('div');
  tags.className = 'dest-card-tags';
  d.tags.forEach(t => {
    const [iconName, ...rest] = t.split(' ');
    const span = document.createElement('span');
    span.className = 'tag';
    span.append(icon(iconName), document.createTextNode(rest.join(' ')));
    tags.append(span);
  });

  body.append(h2, p, tags);
  card.append(imgWrap, body);
  grid.append(card);
});
</script>

</body>
</html>
