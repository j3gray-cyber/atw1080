<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stylised Route Map</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #111; overflow-x: hidden; }

    .controls { margin: 12px 16px; display: flex; flex-wrap: wrap; gap: 4px 0; }
    label { margin: 0 10px; cursor: pointer; color: #ccc; font-size: 13px; }

    .map-container { position: relative; display: inline-block; max-width: 100%; width: 100%; }
    .map-container img { width: 100%; display: block; }
    svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .label { font-size: 0.7vw; fill: #eee; font-family: Arial, sans-serif; }

    /* ── Side panel ── */
    #info-panel {
      position: fixed;
      top: 0; right: 0;
      width: 320px;
      height: 100vh;
      background: #1a1a22;
      border-left: 1px solid #333;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.25s ease;
      z-index: 100;
      display: flex;
      flex-direction: column;
    }
    #info-panel.open { transform: translateX(0); }

    #panel-header {
      padding: 18px 16px 14px;
      border-bottom: 1px solid #2a2a36;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      position: sticky;
      top: 0;
      background: #1a1a22;
      z-index: 2;
    }
    #panel-title {
      font-size: 18px;
      font-weight: 600;
      color: #f0f0f0;
      line-height: 1.2;
    }
    #panel-subtitle {
      font-size: 12px;
      color: #888;
      margin-top: 3px;
    }
    #panel-close {
      background: none;
      border: none;
      color: #888;
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
      flex-shrink: 0;
      padding: 2px 4px;
    }
    #panel-close:hover { color: #ddd; }

    #panel-body {
      padding: 14px 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .info-card {
      background: #22222e;
      border: 1px solid #2e2e3e;
      border-radius: 10px;
      padding: 14px 15px;
    }
    .info-card-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: #666;
      margin-bottom: 8px;
    }
    .info-card p {
      font-size: 12px;
      color: #999;
      line-height: 1.5;
    }

    /* weather grid */
    .weather-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
      margin-top: 4px;
    }
    .weather-month {
      background: #1a1a24;
      border-radius: 7px;
      padding: 7px 4px;
      text-align: center;
    }
    .wm-name { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #666; margin-bottom: 2px; }
    .wm-hi   { font-size: 15px; font-weight: 600; color: #e8e8e8; line-height: 1; }
    .wm-lo   { font-size: 10px; color: #777; margin-top: 2px; }
    .wm-rain { font-size: 10px; color: #5a9fcf; margin-top: 2px; }

    /* water / safety badges */
    .badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      margin-bottom: 5px;
    }
    .badge-safe    { background: #1a3d2a; color: #6dcf95; }
    .badge-caution { background: #3d3010; color: #f0c060; }
    .badge-danger  { background: #3d1010; color: #f08080; }

    .safety-link {
      display: block;
      font-size: 11px;
      color: #5a9fcf;
      margin-top: 6px;
      text-decoration: none;
    }
    .safety-link:hover { text-decoration: underline; }

    /* rate */
    .rate-big { font-size: 22px; font-weight: 300; color: #e0e0e0; letter-spacing: -0.01em; }
    .rate-sub { font-size: 11px; color: #666; margin-top: 2px; }

    /* shimmer */
    .shimmer {
      background: linear-gradient(90deg, #2a2a38 25%, #32323e 50%, #2a2a38 75%);
      background-size: 200% 100%;
      animation: sh 1.4s infinite;
      border-radius: 4px;
      height: 12px;
      margin: 4px 0;
    }
    @keyframes sh { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* node highlight */
    .node-hit { cursor: pointer; }
    .node-hit circle { transition: r 0.12s; }
    .node-hit:hover circle { filter: brightness(1.4); }

    /* backdrop for mobile */
    #panel-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 99;
    }
    #panel-backdrop.open { display: block; }
  </style>
</head>

    /* ════════════════ Path geometry helpers ════════════════ */
    function buildSegment(p1, p2, startMode) {
      const dx = p2.x - p1.x, dy = p2.y - p1.y;
      const adx = Math.abs(dx), ady = Math.abs(dy);
      const signX = Math.sign(dx), signY = Math.sign(dy);
      if (adx === 0 || ady === 0 || adx === ady) return [p1, p2];
      if (!startMode) return [p1, { x: p2.x, y: p1.y }, p2];
      if (startMode === "horizontal") return [p1, { x: p2.x, y: p1.y }, p2];
      if (startMode === "vertical")   return [p1, { x: p1.x, y: p2.y }, p2];
      const d = Math.min(adx, ady);
      return [p1, { x: p1.x + signX * d, y: p1.y + signY * d }, p2];
    }

    function roundedPath(points, radius) {
      if (points.length < 2) return "";
      let d = `M ${points[0].x} ${points[0].y}`;
      for (let i = 1; i < points.length - 1; i++) {
        const p0 = points[i-1], p1 = points[i], p2 = points[i+1];
        const dx1 = p1.x-p0.x, dy1 = p1.y-p0.y;
        const dx2 = p2.x-p1.x, dy2 = p2.y-p1.y;
        const len1 = Math.hypot(dx1,dy1), len2 = Math.hypot(dx2,dy2);
        const r = Math.min(radius, len1/2, len2/2);
        const p1a = { x: p1.x-(dx1/len1)*r, y: p1.y-(dy1/len1)*r };
        const p1b = { x: p1.x+(dx2/len2)*r, y: p1.y+(dy2/len2)*r };
        d += ` L ${p1a.x} ${p1a.y} Q ${p1.x} ${p1.y} ${p1b.x} ${p1b.y}`;
      }
      const last = points[points.length-1];
      d += ` L ${last.x} ${last.y}`;
      return d;
    }

    function getLabelOffset(pos) {
      const offset = (window.innerWidth / 100) + 1;
      switch(pos) {
        case "above": return { dx:0, dy:-offset, anchor:"middle" };
        case "below": return { dx:0, dy:offset*1.5, anchor:"middle" };
        case "left":  return { dx:-offset, dy:4, anchor:"end" };
        default:      return { dx:offset, dy:4, anchor:"start" };
      }
    }

    /* ════════════════ Draw ════════════════ */
    function drawRoutes() {
      const svg = document.getElementById("overlay");
      svg.innerHTML = "";
      const map = document.getElementById("mapImage");
      const width = map.clientWidth, height = map.clientHeight;
      const showLabels = document.getElementById("toggleLabels").checked;

      routes.forEach(route => {
        if (!document.getElementById(route.toggleId).checked) return;

        // Draw paths
        for (let i = 0; i < route.points.length - 1; i++) {
          const raw1 = route.points[i], raw2 = route.points[i+1];
          const p1 = { x: raw1.x*width/100, y: raw1.y*height/100 };
          const p2 = { x: raw2.x*width/100, y: raw2.y*height/100 };
          const constrained = buildSegment(p1, p2, raw1.startMode || "diagonal");
          const path = document.createElementNS("http://www.w3.org/2000/svg","path");
          path.setAttribute("d", roundedPath(constrained, 6));
          path.setAttribute("stroke", route.color);
          path.setAttribute("stroke-width", (width/400)+3);
          path.setAttribute("fill", "none");
          path.setAttribute("stroke-linecap", "round");
          svg.appendChild(path);
        }

        // Draw nodes
        route.points.forEach(p => {
          if (!p.label || !p.label.trim()) return;
          const cx = p.x*width/100, cy = p.y*height/100;
          const g = document.createElementNS("http://www.w3.org/2000/svg","g");
          g.setAttribute("class","node-hit");

          const circle = document.createElementNS("http://www.w3.org/2000/svg","circle");
          circle.setAttribute("cx", cx);
          circle.setAttribute("cy", cy);
          circle.setAttribute("r", (width/300)+2);
          circle.setAttribute("fill","white");
          circle.setAttribute("stroke", route.color);
          circle.setAttribute("stroke-width", (width/600)+2);
          g.appendChild(circle);

          if (showLabels && p.label.trim()) {
            const text = document.createElementNS("http://www.w3.org/2000/svg","text");
            const off = getLabelOffset(p.labelPos);
            text.setAttribute("x", cx+off.dx);
            text.setAttribute("y", cy+off.dy);
            text.setAttribute("text-anchor", off.anchor);
            text.setAttribute("class","label");
            text.textContent = p.label.trim();
            g.appendChild(text);
          }

          // Transparent hit area
          const hit = document.createElementNS("http://www.w3.org/2000/svg","circle");
          hit.setAttribute("cx", cx);
          hit.setAttribute("cy", cy);
          hit.setAttribute("r", Math.max((width/300)+10, 16));
          hit.setAttribute("fill","transparent");
          g.appendChild(hit);

          g.addEventListener("click", () => openPanel(p.label.trim(), route.color));
          svg.appendChild(g);
        });
      });
    }

    /* ════════════════ Panel ════════════════ */
    function openPanel(stopName, color) {
      document.getElementById("panel-title").textContent = stopName;
      document.getElementById("panel-subtitle").textContent = "";
      document.getElementById("info-panel").classList.add("open");
      document.getElementById("panel-backdrop").classList.add("open");

      // Reset cards to shimmer
      resetCard("card-climate","Climate",`
        <div class="shimmer" style="width:60%;margin-bottom:8px"></div>
        <div class="weather-grid" id="weather-grid">
          ${[0,1,2,3].map(()=>`<div class="weather-month"><div class="shimmer" style="height:50px;width:100%"></div></div>`).join("")}
        </div>
      `);
      resetCard("card-water","Water safety",`<div class="shimmer" style="width:55%"></div>`);
      resetCard("card-safety","Travel safety",`<div class="shimmer" style="width:70%"></div><div class="shimmer" style="width:45%;margin-top:6px"></div>`);
      resetCard("card-rate","Exchange rate (AUD)",`<div class="shimmer" style="width:50%"></div>`);

      const info = STOP_DATA[stopName];
      if (!info) {
        document.getElementById("panel-subtitle").textContent = "No detailed data available for this stop.";
        return;
      }
      document.getElementById("panel-subtitle").textContent = info.country;

      fetchClimate(info.lat, info.lon);
      setWater(info.water, info.waterNote);
      fetchSafety(info.country);
      fetchRate(info.currency);
    }

    function resetCard(id, label, inner) {
      document.getElementById(id).innerHTML = `<div class="info-card-label">${label}</div>${inner}`;
    }

    function closePanel() {
      document.getElementById("info-panel").classList.remove("open");
      document.getElementById("panel-backdrop").classList.remove("open");
    }

    document.getElementById("panel-close").addEventListener("click", closePanel);
    document.getElementById("panel-backdrop").addEventListener("click", closePanel);

    /* ── Climate ── */
    async function fetchClimate(lat, lon) {
      const card = document.getElementById("card-climate");
      try {
        const url = `https://climate-api.open-meteo.com/v1/climate?latitude=${lat}&longitude=${lon}&start_date=1991-01-01&end_date=2020-12-31&monthly=temperature_2m_max,temperature_2m_min,precipitation_sum&models=EC_Earth3P_HR`;
        const data = await fetch(url).then(r => r.json());
        if (!data.monthly) throw new Error();
        const MO = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const hi = data.monthly.temperature_2m_max;
        const lo = data.monthly.temperature_2m_min;
        const rn = data.monthly.precipitation_sum;
        const keys = [0,3,6,9];
        card.innerHTML = `
          <div class="info-card-label">Climate (monthly avg)</div>
          <div class="weather-grid">
            ${keys.map(i => `
              <div class="weather-month">
                <div class="wm-name">${MO[i]}</div>
                <div class="wm-hi">${Math.round(hi[i])}°</div>
                <div class="wm-lo">${Math.round(lo[i])}° lo</div>
                <div class="wm-rain">${Math.round(rn[i])}mm</div>
              </div>`).join("")}
          </div>
          <p style="margin-top:8px">30-yr averages · Jan / Apr / Jul / Oct</p>`;
      } catch(_) {
        card.innerHTML = `<div class="info-card-label">Climate</div><p>Climate data unavailable.</p>`;
      }
    }

    /* ── Water ── */
    function setWater(status, note) {
      const card = document.getElementById("card-water");
      const badgeClass = { safe:"badge-safe", caution:"badge-caution", unsafe:"badge-danger" }[status] || "badge-caution";
      const label = { safe:"Safe to drink", caution:"Use bottled water", unsafe:"Not safe" }[status] || "Check locally";
      card.innerHTML = `
        <div class="info-card-label">Water safety</div>
        <div class="badge ${badgeClass}">${label}</div>
        <p>${note}</p>`;
    }

    /* ── Safety ── */
    const SAFETY_CLASS = { 1:"badge-safe", 2:"badge-caution", 3:"badge-danger", 4:"badge-danger" };

    async function fetchSafety(countryName) {
      const card = document.getElementById("card-safety");
      try {
        let country;
        try {
          const r = await fetch("travel-guides/data/safety-cache.json");
          if (r.ok) {
            const cache = await r.json();
            country = cache[countryName];
          }
        } catch(_) {}

        if (!country) {
          const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent("https://www.smartraveller.gov.au/destinations-export")}`;
          const r = await fetch(proxy);
          const body = await r.json();
          const list = JSON.parse(body.contents);
          country = list.find(c => c.name === countryName);
        }

        if (!country) throw new Error("not found");
        const level = country.advice_level;
        const bc = SAFETY_CLASS[level] || "badge-caution";
        card.innerHTML = `
          <div class="info-card-label">Travel safety (Smartraveller)</div>
          <div class="badge ${bc}">Level ${level}: ${country.advice_text}</div>
          <p style="margin-top:5px">Updated ${country.last_updated}</p>
          <a class="safety-link" href="${country.url}" target="_blank" rel="noopener">Full Smartraveller advice →</a>`;
      } catch(_) {
        const slug = countryName.toLowerCase().replace(/ /g,"-");
        card.innerHTML = `
          <div class="info-card-label">Travel safety</div>
          <div class="badge badge-caution">Check before travel</div>
          <a class="safety-link" href="https://www.smartraveller.gov.au/destinations/${slug}" target="_blank" rel="noopener">View Smartraveller advice →</a>`;
      }
    }

    /* ── Exchange rate ── */
    async function fetchRate(currencyCode) {
      const card = document.getElementById("card-rate");
      if (currencyCode === "AUD") {
        card.innerHTML = `<div class="info-card-label">Currency</div><p>Local currency is AUD.</p>`;
        return;
      }
      try {
        const data = await fetch(`https://api.frankfurter.app/latest?from=AUD&to=${currencyCode}`).then(r => r.json());
        const rate = data.rates[currencyCode];
        if (!rate) throw new Error();
        card.innerHTML = `
          <div class="info-card-label">Exchange rate (AUD →  ${currencyCode})</div>
          <div class="rate-big">${rate.toFixed(2)} ${currencyCode}</div>
          <div class="rate-sub">per 1 AUD · live rate</div>
          <p style="margin-top:6px">100 AUD ≈ ${(rate*100).toFixed(0)} ${currencyCode}</p>`;
      } catch(_) {
        card.innerHTML = `
          <div class="info-card-label">Exchange rate (AUD → ${currencyCode})</div>
          <p>Rate unavailable.</p>
          <a class="safety-link" href="https://www.xe.com/currencyconverter/convert/?From=AUD&To=${currencyCode}" target="_blank">Check on XE.com →</a>`;
      }
    }

    /* ════════════════ Init ════════════════ */
    window.onload = drawRoutes;
    window.onresize = drawRoutes;
  </script>
</body>
